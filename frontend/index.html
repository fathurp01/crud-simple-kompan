<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRUD Mahasiswa</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <h1>Manajemen Data Mahasiswa</h1>

    <section class="card">
      <h2 id="form-title">Tambah Mahasiswa</h2>
      <form id="mahasiswa-form">
        <input type="hidden" id="mahasiswa-id" />

        <label>
          Nama
          <input id="nama" type="text" required />
        </label>

        <label>
          Jurusan
          <input id="jurusan" type="text" required />
        </label>

        <label>
          Angkatan
          <input id="angkatan" type="number" min="1900" max="9999" required />
        </label>

        <div class="actions">
          <button type="submit" id="submit-btn">Simpan</button>
          <button type="button" id="cancel-btn" class="secondary">Batal Edit</button>
        </div>
      </form>
      <p id="message"></p>
    </section>

    <section class="card">
      <h2>Daftar Mahasiswa</h2>
      <table>
        <thead>
          <tr>
            <th>Nama</th>
            <th>Jurusan</th>
            <th>Angkatan</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="mahasiswa-list"></tbody>
      </table>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
