<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRUD Kopi</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <h1>Manajemen Menu Kopi</h1>

    <section class="card">
      <h2 id="form-title">Tambah Kopi</h2>
      <form id="coffee-form">
        <input type="hidden" id="coffee-id" />

        <label>
          Nama Kopi
          <input id="name" type="text" required />
        </label>

        <label>
          Origin
          <input id="origin" type="text" required />
        </label>

        <label>
          Harga
          <input id="price" type="number" step="0.01" min="0.01" required />
        </label>

        <label>
          Stok
          <input id="stock" type="number" min="0" required />
        </label>

        <label>
          Deskripsi
          <textarea id="description" rows="3"></textarea>
        </label>

        <div class="actions">
          <button type="submit" id="submit-btn">Simpan</button>
          <button type="button" id="cancel-btn" class="secondary">Batal Edit</button>
        </div>
      </form>
      <p id="message"></p>
    </section>

    <section class="card">
      <h2>Daftar Kopi</h2>
      <table>
        <thead>
          <tr>
            <th>Nama</th>
            <th>Origin</th>
            <th>Harga</th>
            <th>Stok</th>
            <th>Deskripsi</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="coffee-list"></tbody>
      </table>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
